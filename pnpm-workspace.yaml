packages:
  # apps directory
  - 'apps/*'
  # all packages in direct subdirs of packages/
  - 'packages/*'
  # graphql related packages
  - 'packages/graphql/*'

# For pnpm deploy in Docker: sync workspace deps after build, inject workspace packages
syncInjectedDepsAfterScripts:
  - build
injectWorkspacePackages: true

