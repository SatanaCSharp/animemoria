name: Pull Request

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: '9.15.3'

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed workspaces
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      matrix: ${{ steps.changes.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run change detection
        id: changes
        uses: ./.github/actions/change-detection
        with:
          base-branch: ${{ github.base_ref }}

  quality-checks:
    name: 'Quality: ${{ matrix.workspace }}'
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node: 'true'
          app-dependencies: 'true'

      - name: Lint
        env:
          WORKSPACE: ${{ matrix.workspace }}
        run: pnpm turbo run lint --filter="$WORKSPACE"

      - name: Prettier check
        env:
          WORKSPACE: ${{ matrix.workspace }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          WORKSPACE_DIR=$(pnpm -F "$WORKSPACE" exec pwd 2>/dev/null || true)
          if [ -z "$WORKSPACE_DIR" ]; then
            echo "Could not resolve path for $WORKSPACE, skipping prettier"
            exit 0
          fi
          REL_PATH="${WORKSPACE_DIR#$GITHUB_WORKSPACE/}"
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            -- "${REL_PATH}/**/*.ts" "${REL_PATH}/**/*.tsx" \
               "${REL_PATH}/**/*.js" "${REL_PATH}/**/*.jsx" \
               "${REL_PATH}/**/*.json" "${REL_PATH}/**/*.css" \
               "${REL_PATH}/**/*.md" | xargs)
          if [ -n "$CHANGED" ]; then
            echo "Checking prettier for: $CHANGED"
            npx prettier --check $CHANGED
          else
            echo "No prettier-eligible files changed in $WORKSPACE"
          fi

  tests:
    name: 'Tests: ${{ matrix.workspace }}'
    needs: [detect-changes, quality-checks]
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.quality-checks.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node: 'true'
          app-dependencies: 'true'

      - name: Run tests
        env:
          WORKSPACE: ${{ matrix.workspace }}
        run: pnpm turbo run test --filter="$WORKSPACE"
