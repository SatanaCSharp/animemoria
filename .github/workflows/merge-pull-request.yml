name: CI — Merge

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: merge-master
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/_detect-changes.yml
    with:
      base-branch: master

  quality-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/_quality-checks.yml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}
      base-ref: master
      node-version: '24.x'
      pnpm-version: '9.15.3'

  tests:
    needs: [detect-changes, quality-checks]
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.quality-checks.result == 'success'
    uses: ./.github/workflows/_tests.yml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}
      node-version: '24.x'
      pnpm-version: '9.15.3'
