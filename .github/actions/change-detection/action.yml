name: Change detection
author: yuriihorchuk
description: This reusable action for tracking changes of packages and apps

inputs:
  base-branch:
    description: Base branch to compare against (e.g. master).
    required: false
    default: 'master'
  node-version:
    description: Node.js version to use.
    required: false
    default: '24.x'
  pnpm-version:
    description: pnpm version to use.
    required: false
    default: '9.15.3'

outputs:
  has_changes:
    description: "'true' if any workspace changed, 'false' otherwise"
    value: ${{ steps.set-matrix.outputs.has_changes }}
  matrix:
    description: 'JSON array of changed workspace names'
    value: ${{ steps.set-matrix.outputs.matrix }}

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      uses: ./.github/actions/setup-environment
      with:
        pnpm: 'true'
        node: 'true'
        app-dependencies: 'true'
        node-version: ${{ inputs.node-version }}
        pnpm-version: ${{ inputs.pnpm-version }}

    - name: Detect changed workspaces
      id: set-matrix
      shell: bash
      run: |
        set -euo pipefail

        CHANGES=$(pnpm turbo ls --filter="...[origin/${{ inputs.base-branch }}]" --output json | jq -c '[.packages.items[].name]')

        if [ "$CHANGES" == "[]" ] || [ -z "$CHANGES" ]; then
          echo "No changed workspaces — skipping quality checks and tests."
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "matrix=[]" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "matrix=$CHANGES" >> $GITHUB_OUTPUT
        fi
